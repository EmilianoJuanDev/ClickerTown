<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Town</title>
    <link rel="stylesheet" href="style.css">
    <!-- 🚀 CARGAR PHASER PRIMERO (desde CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
</head>
<body>
    <div class="container">
    <!-- Canvas donde Phaser renderizará el juego con fondo CSS visible -->
    <div id="game-container" style="background-image: url('assets/Pasto.png'); background-size: cover; background-attachment: fixed; position: relative;"></div>

    <header class="topbar">
        <div>Madera: <span id="madera">0</span></div>
        <div>Piedra: <span id="piedra">0</span></div>
        <div>Oro: <span id="oro">0</span></div>
        <div>Aldeanos: <span id="aldeanos">0/10</span></div>
    </header>

    <aside class="tienda">
        <div class="seccion-aldeanos">
            <h3>Aldeanos</h3>
            <button>Comprar Aldeano (50 Oro)</button>
        </div>
        <div class="seccion-mejoras">
            <h3>Mejoras</h3>
            <button>Hacha de Piedra (100 Madera)</button>
        </div>
    </aside>
    
    <!-- 📚 CARGAR TUS SCRIPTS EN ORDEN (dependencias primero) -->
    <script src="GridManager.js"></script>
    <script src="BuildingClasses.js"></script>
    <script src="CameraManager.js"></script>
    <script src="VillageSceneCompleta.js"></script>
    <script src="script.js"></script>
</div>
</body>
</html>
